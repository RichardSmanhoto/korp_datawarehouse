cubes:
  - name: FatoFinanceiroContaReceber
    sql_table: "`viasoft_elt`.`{COMPILE_CONTEXT.securityContext.schema}.FatoFinanceiroContaReceber`"
    title: Financeiro Contas a Receber
    
    meta:
      - versao: "__COMMIT_SHA__"

    joins:
      - name: FinanceiroCentroCusto
        relationship: belongsTo
        sql: "{CUBE}.IdCentroCusto = {FinanceiroCentroCusto}.Id"

      - name: FinanceiroContaGerencial
        relationship: belongsTo
        sql: "{CUBE}.IdContaGerencial = {FinanceiroContaGerencial}.Id"

      - name: PreCadastrosEmpresa
        relationship: belongsTo
        sql: "{CUBE}.IdEmpresa = {PreCadastrosEmpresa}.Id"

      - name: VendaCliente
        relationship: belongsTo
        sql: "{CUBE}.IdCliente = {VendaCliente}.Id"

      - name: CompraFornecedor
        relationship: belongsTo
        sql: "{CUBE}.IdFornecedor = {CompraFornecedor}.Id"

      - name: FinanceiroBanco
        relationship: belongsTo
        sql: "{CUBE}.IdBanco = {FinanceiroBanco}.Id"

      - name: FinanceiroTipoPagamento
        relationship: belongsTo
        sql: "{CUBE}.IdTipoPagamento = {FinanceiroTipoPagamento}.Id"

      - name: FinanceiroTipoDocumento
        relationship: belongsTo
        sql: "{CUBE}.IdTipoDocumento = {FinanceiroTipoDocumento}.Id"

      - name: FinanceiroContaReceberDocumento
        relationship: belongsTo
        sql: "{CUBE}.IdDocumento = {FinanceiroContaReceberDocumento}.Id"

      - name: FinanceiroContaReceberStatus
        relationship: belongsTo
        sql: "{CUBE}.IdStatus = {FinanceiroContaReceberStatus}.Id"

      - name: FaturamentoNotaFiscal
        relationship: belongsTo
        sql: "{CUBE}.IdNotaFiscal = {FaturamentoNotaFiscal}.Id"

      - name: FinanceiroExtratoBancario
        relationship: belongsTo
        sql: "{CUBE}.IdExtratoBancario = {FinanceiroExtratoBancario}.Id"

      - name: ClienteMatriz
        relationship: belongsTo
        sql: "{CUBE}.IdClienteMatrizGrupoEmpresarial = {ClienteMatriz}.Id"

      - name: VendaSegmento
        relationship: belongsTo
        sql: "{CUBE}.IdSegmentoCliente = {VendaSegmento}.Id"

      - name: VendaClienteClasse
        relationship: belongsTo
        sql: "{CUBE}.IdClasseCliente = {VendaClienteClasse}.Id"

      - name: DataEmissao
        relationship: belongsTo
        sql: "{CUBE}.IdDataEmissao = {DataEmissao}.Id"

      - name: DataVencimento
        relationship: belongsTo
        sql: "{CUBE}.IdDataVencimento = {DataVencimento}.Id"

      - name: DataRecebimento
        relationship: belongsTo
        sql: "{CUBE}.IdDataRecebimento = {DataRecebimento}.Id"

      - name: StatusRegistro
        relationship: belongsTo
        sql: "{CUBE}.IdStatusRegistro = {StatusRegistro}.Id"

    measures:
      - name: count
        type: count

      - name: valorBrutoSum
        sql: ValorBruto
        type: sum
        title: Soma do Valor Bruto

      - name: valorDescontoSum
        sql: ValorDesconto
        type: sum
        title: Soma do Desconto

      - name: valorJurosSum
        sql: ValorJuros
        type: sum
        title: Soma dos Juros

      - name: valorMultaSum
        sql: ValorMulta
        type: sum
        title: Soma da Multa

      - name: valorRetencaoSum
        sql: ValorRetencao
        type: sum
        title: Soma da Retenção

      - name: valorDesoneracaoSum
        sql: ValorDesoneracao
        type: sum
        title: Soma da Desoneração

      - name: valorAcrescimoSum
        sql: ValorAcrescimo
        type: sum
        title: Soma do Acréscimo

      - name: valorLiquidoSum
        sql: ValorLiquido
        type: sum
        title: Soma do Valor Líquido

      - name: diasInadimplenciaSum
        sql: DiasInadimplencia
        type: sum
        title: Soma dos Dias em Inadimplência

      - name: diasVencimentoSum
        sql: DiasVencimento
        type: sum
        title: Soma dos Dias até o Vencimento

    dimensions:
      - name: id
        sql: Id
        type: string
        primary_key: true
        title: Id

      - name: idCentroCusto
        sql: IdCentroCusto
        type: number
        title: Centro de Custo

      - name: idContaGerencial
        sql: IdContaGerencial
        type: number
        title: Conta Gerencial

      - name: idEmpresa
        sql: IdEmpresa
        type: number
        title: Empresa

      - name: idCliente
        sql: IdCliente
        type: number
        title: Cliente

      - name: idFornecedor
        sql: IdFornecedor
        type: number
        title: Fornecedor

      - name: idBanco
        sql: IdBanco
        type: number
        title: Banco

      - name: idTipoPagamento
        sql: IdTipoPagamento
        type: number
        title: Tipo de Pagamento

      - name: idTipoDocumento
        sql: IdTipoDocumento
        type: number
        title: Tipo de Documento

      - name: idDocumento
        sql: IdDocumento
        type: number
        title: Documento

      - name: idStatus
        sql: IdStatus
        type: number
        title: Status

      - name: idNotaFiscal
        sql: IdNotaFiscal
        type: number
        title: Nota Fiscal

      - name: idExtratoBancario
        sql: IdExtratoBancario
        type: number
        title: Extrato Bancário

      - name: idClienteMatrizGrupoEmpresarial
        sql: IdClienteMatrizGrupoEmpresarial
        type: number
        title: Cliente Matriz

      - name: idSegmentoCliente
        sql: IdSegmentoCliente
        type: number
        title: Segmento do Cliente

      - name: idClasseCliente
        sql: IdClasseCliente
        type: number
        title: Classe do Cliente

      - name: idDataEmissao
        sql: IdDataEmissao
        type: number
        title: Data de Emissão

      - name: idDataVencimento
        sql: IdDataVencimento
        type: number
        title: Data de Vencimento

      - name: idDataRecebimento
        sql: IdDataRecebimento
        type: number
        title: Data de Recebimento

      - name: idStatusRegistro
        sql: IdStatusRegistro
        type: string
        title: Registro Ativo

      - name: valorBruto
        sql: ValorBruto
        type: number
        title: Valor Bruto

      - name: valorDesconto
        sql: ValorDesconto
        type: number
        title: Desconto

      - name: valorJuros
        sql: ValorJuros
        type: number
        title: Juros

      - name: valorMulta
        sql: ValorMulta
        type: number
        title: Multa

      - name: valorRetencao
        sql: ValorRetencao
        type: number
        title: Retenção

      - name: valorDesoneracao
        sql: ValorDesoneracao
        type: number
        title: Desoneração

      - name: valorAcrescimo
        sql: ValorAcrescimo
        type: number
        title: Acréscimo

      - name: valorLiquido
        sql: ValorLiquido
        type: number
        title: Valor Líquido

      - name: diasInadimplencia
        sql: DiasInadimplencia
        type: number
        title: Dias em Inadimplência

      - name: diasVencimento
        sql: DiasVencimento
        type: number
        title: Dias até o Vencimento
