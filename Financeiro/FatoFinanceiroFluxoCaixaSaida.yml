cubes:
  - name: FatoFinanceiroFluxoCaixaSaida
    sql_table: "`viasoft_elt`.`{COMPILE_CONTEXT.securityContext.schema}.FatoFinanceiroFluxoCaixaSaida`"
    title: Financeiro Fluxo de Caixa - Saída
    
    meta:
      - versao: "__COMMIT_SHA__"

    joins:
      - name: Data
        relationship: belongsTo
        sql: "{CUBE}.IdData = {Data}.Id"

      - name: PreCadastrosEmpresa
        relationship: belongsTo
        sql: "{CUBE}.IdEmpresa = {PreCadastrosEmpresa}.Id"

      - name: FinanceiroCentroCusto
        relationship: belongsTo
        sql: "{CUBE}.IdCentroCusto = {FinanceiroCentroCusto}.Id"

      - name: FinanceiroContaGerencial
        relationship: belongsTo
        sql: "{CUBE}.IdContaGerencial = {FinanceiroContaGerencial}.Id"

      - name: FinanceiroTipoConsolidacao
        relationship: belongsTo
        sql: "{CUBE}.IdFinanceiroTipoConsolidacao = {FinanceiroTipoConsolidacao}.Id"

      - name: FinanceiroBanco
        relationship: belongsTo
        sql: "{CUBE}.IdBanco = {FinanceiroBanco}.Id"

    measures:
      - name: count
        type: count

      - name: valorSum
        sql: Valor
        type: sum
        title: Soma do Valor

    dimensions:
      - name: id
        sql: Id
        type: string
        primary_key: true
        title: Id

      - name: idData
        sql: IdData
        type: number
        title: Data

      - name: idEmpresa
        sql: IdEmpresa
        type: number
        title: Empresa

      - name: idCentroCusto
        sql: IdCentroCusto
        type: number
        title: Centro de Custo

      - name: idContaGerencial
        sql: IdContaGerencial
        type: number
        title: Conta Gerencial

      - name: idFinanceiroTipoConsolidacao
        sql: IdFinanceiroTipoConsolidacao
        type: number
        title: Tipo de Consolidação

      - name: idBanco
        sql: IdBanco
        type: number
        title: Banco

      - name: valor
        sql: Valor
        type: number
        title: Valor
