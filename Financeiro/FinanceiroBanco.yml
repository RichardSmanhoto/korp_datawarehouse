cubes:
  - name: FinanceiroBanco
    sql_table: "`viasoft_elt`.`{COMPILE_CONTEXT.securityContext.schema}.FinanceiroBanco`"
    title: Financeiro Banco
    meta:
      - versao: "__COMMIT_SHA__"

    joins:
      - name: Data
        sql: "{CUBE}.IdDataSaldoInicial = {Data}.id"
        relationship: belongsTo

    measures:
      - name: count
        type: count

      - name: valorSaldoInicial
        sql: ValorSaldoInicial
        type: number
        title: Valor Saldo Inicial

      - name: valorSaldoAnterior
        sql: ValorSaldoAnterior
        type: number
        title: Valor Saldo Anterior

    dimensions:
      - name: id
        sql: Id
        type: number
        primary_key: true
        title: Id

      - name: codigo
        sql: Codigo
        type: string
        title: Código

      - name: sigla
        sql: Sigla
        type: string
        title: Sigla

      - name: razaoSocial
        sql: RazaoSocial
        type: string
        title: Razão Social

      - name: codigoFebraban
        sql: CodigoFebraban
        type: string
        title: Código FEBRABAN

      - name: idEmpresaTitular
        sql: IdEmpresaTitular
        type: number
        title: Id Empresa Titular

      - name: razaoSocialEmpresaTitular
        sql: RazaoSocialEmpresaTitular
        type: string
        title: Razão Social Empresa Titular
