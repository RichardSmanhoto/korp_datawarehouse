cubes:
  - name: FinanceiroContaPagarDocumento
    sql_table: "`viasoft_elt`.`{COMPILE_CONTEXT.securityContext.schema}.FinanceiroContaPagarDocumento`"
    title: Financeiro Documento (Contas a Pagar)
    meta:
      - versao: "__COMMIT_SHA__"

    measures:
      - name: count
        type: count

    dimensions:
      - name: id
        sql: Id
        type: number
        primary_key: true
        title: Id

      - name: documento
        sql: Documento
        type: string
        title: Documento

      - name: parcela
        sql: Parcela
        type: string
        title: Parcela

      - name: adiantamento
        sql: Adiantamento
        type: boolean
        title: Adiantamento
