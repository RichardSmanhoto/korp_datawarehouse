cubes:
  - name: FatoFinanceiroPlanejadoXRealizado
    sql_table: "`viasoft_elt`.`{COMPILE_CONTEXT.securityContext.schema}.FatoFinanceiroPlanejadoXRealizado`"
    title: Financeiro Planejado x Realizado
    
    meta:
      - versao: "__COMMIT_SHA__"

    joins:
      - name: FinanceiroCentroCusto
        relationship: belongsTo
        sql: "{CUBE}.IdCentroCusto = {FinanceiroCentroCusto}.Id"

      - name: FinanceiroContaGerencial
        relationship: belongsTo
        sql: "{CUBE}.IdContaGerencial = {FinanceiroContaGerencial}.Id"

      - name: PreCadastrosEmpresa
        relationship: belongsTo
        sql: "{CUBE}.IdEmpresa = {PreCadastrosEmpresa}.Id"

      - name: Data
        relationship: belongsTo
        sql: "{CUBE}.IdData = {Data}.Id"

      - name: DataCriacao
        relationship: belongsTo
        sql: "{CUBE}.IdDataCriacao = {DataCriacao}.Id"

      - name: StatusRegistro
        relationship: belongsTo
        sql: "{CUBE}.IdStatusRegistro = {StatusRegistro}.Id"

    measures:
      - name: count
        type: count

      - name: valorReceitaPlanejadaSum
        sql: ValorReceitaPlanejada
        type: sum
        title: Soma da Receita Planejada

      - name: valorReceitaRealizadaSum
        sql: ValorReceitaRealizada
        type: sum
        title: Soma da Receita Realizada

      - name: valorDespesaPlanejadaSum
        sql: ValorDespesaPlanejada
        type: sum
        title: Soma da Despesa Planejada

      - name: valorDespesaRealizadaSum
        sql: ValorDespesaRealizada
        type: sum
        title: Soma da Despesa Realizada

    dimensions:
      - name: id
        sql: Id
        type: string
        primary_key: true
        title: Id

      - name: idCentroCusto
        sql: IdCentroCusto
        type: number
        title: Centro de Custo

      - name: idContaGerencial
        sql: IdContaGerencial
        type: number
        title: Conta Gerencial

      - name: idEmpresa
        sql: IdEmpresa
        type: number
        title: Empresa

      - name: idData
        sql: IdData
        type: number
        title: Data

      - name: idDataCriacao
        sql: IdDataCriacao
        type: number
        title: Data de Criação

      - name: idStatusRegistro
        sql: IdStatusRegistro
        type: string
        title: Registro Ativo

      - name: valorReceitaPlanejada
        sql: ValorReceitaPlanejada
        type: number
        title: Receita Planejada

      - name: valorReceitaRealizada
        sql: ValorReceitaRealizada
        type: number
        title: Receita Realizada

      - name: valorDespesaPlanejada
        sql: ValorDespesaPlanejada
        type: number
        title: Despesa Planejada

      - name: valorDespesaRealizada
        sql: ValorDespesaRealizada
        type: number
        title: Despesa Realizada
