cubes:
  - name: FatoContabilLancamento
    sql_table: "`viasoft_elt`.`{COMPILE_CONTEXT.securityContext.schema}.FatoContabilLancamento`"
    title: Contábil Lançamento
    
    meta:
      - versao: "__COMMIT_SHA__"

    joins:
      - name: ContabilLancamentoContabilCabecalho
        relationship: belongsTo
        sql: "{CUBE}.IdLancamentoContabilCabecalho = {ContabilLancamentoContabilCabecalho}.Id"

      - name: VendaCliente
        relationship: belongsTo
        sql: "{CUBE}.IdCliente = {VendaCliente}.Id"

      - name: CompraFornecedor
        relationship: belongsTo
        sql: "{CUBE}.IdFornecedor = {CompraFornecedor}.Id"

      - name: FinanceiroCentroCusto
        relationship: belongsTo
        sql: "{CUBE}.IdCentroCusto = {FinanceiroCentroCusto}.Id"

      - name: ContabilHistoricoLancamentoContabil
        relationship: belongsTo
        sql: "{CUBE}.IdHistoricoLancamentoContabil = {ContabilHistoricoLancamentoContabil}.Id"

      - name: ContabilOperacaoContabil
        relationship: belongsTo
        sql: "{CUBE}.IdOperacaoContabil = {ContabilOperacaoContabil}.Id"

      - name: ContabilPlanoContaContabil
        relationship: belongsTo
        sql: "{CUBE}.IdPlanoContaContabil = {ContabilPlanoContaContabil}.Id"

      - name: DataLancamento
        relationship: belongsTo
        sql: "{CUBE}.IdDataLancamento = {DataLancamento}.Id"

      - name: PreCadastrosEmpresa
        relationship: belongsTo
        sql: "{CUBE}.IdEmpresa = {PreCadastrosEmpresa}.Id"

      - name: StatusRegistro
        relationship: belongsTo
        sql: "{CUBE}.IdStatusRegistro = {StatusRegistro}.Id"

    measures:
      - name: count
        type: count

      - name: valorCreditoSum
        sql: ValorCredito
        type: sum
        title: Soma do Valor Crédito

      - name: valorDebitoSum
        sql: ValorDebito
        type: sum
        title: Soma do Valor Débito

    dimensions:
      - name: id
        sql: Id
        type: string
        primary_key: true
        title: Id

      - name: idLancamentoContabilCabecalho
        sql: IdLancamentoContabilCabecalho
        type: number
        title: Cabeçalho

      - name: idCliente
        sql: IdCliente
        type: number
        title: Cliente

      - name: idFornecedor
        sql: IdFornecedor
        type: number
        title: Fornecedor

      - name: idCentroCusto
        sql: IdCentroCusto
        type: number
        title: Centro de Custo

      - name: idHistoricoLancamentoContabil
        sql: IdHistoricoLancamentoContabil
        type: number
        title: Histórico

      - name: idOperacaoContabil
        sql: IdOperacaoContabil
        type: number
        title: Operação

      - name: idPlanoContaContabil
        sql: IdPlanoContaContabil
        type: number
        title: Plano

      - name: idDataLancamento
        sql: IdDataLancamento
        type: number
        title: Data do Lançamento

      - name: idEmpresa
        sql: IdEmpresa
        type: number
        title: Empresa

      - name: idStatusRegistro
        sql: IdStatusRegistro
        type: string
        title: Registro Ativo

      - name: valorCredito
        sql: ValorCredito
        type: number
        title: Valor Crédito

      - name: valorDebito
        sql: ValorDebito
        type: number
        title: Valor Débito
