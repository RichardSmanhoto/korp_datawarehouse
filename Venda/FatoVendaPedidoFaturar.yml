      - name: LogisticaProdutoGrupo
        relationship: belongsTo
        sql: "{CUBE}.IdProdutoGrupo = {LogisticaProdutoGrupo}.Id"

      - name: LogisticaProdutoCategoria
        relationship: belongsTo
