        sql: "{CUBE}.IdFaturarPedido = {VendaPedidoFaturar}.Id"

    measures:
      - name: count
        type: count

      - name: quantidadeTotalSum
        sql: QuantidadeTotal
        type: sum
        title: Soma da Quantidade Total

      - name: valorUnitarioSum
        sql: ValorUnitario
        type: sum
        title: Soma do Valor Unitário

      - name: descontoSum
        sql: Desconto
        type: sum
        title: Soma do Desconto

      - name: valorTotalSum
        sql: ValorTotal
        type: sum
