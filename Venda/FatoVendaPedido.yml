        type: sum
        title: Soma do COFINS

      - name: valorIcmsStSum
        sql: ValorIcmsSt
        type: sum
        title: Soma do ICMS-ST

      - name: valorIssSum
        sql: ValorIss
        type: sum
        title: Soma do ISS

      - name: valorComissaoSum
        sql: ValorComissao
        type: sum
        title: Soma da Comissão

      - name: valorAcrescimoSum
