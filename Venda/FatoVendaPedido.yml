        title: Soma da Bonificação

      - name: valorCustoMedioSum
        sql: ValorCustoMedio
        type: sum
        title: Soma do Custo Médio

      - name: valorLucroSum
        sql: ValorLucro
        type: sum
        title: Soma do Lucro

