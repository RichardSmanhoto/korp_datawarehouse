    sql_table: "`viasoft_elt`.`{COMPILE_CONTEXT.securityContext.schema}.FatoVendaPedido`"
    title: Venda Pedido
    
    meta:
      - versao: "__COMMIT_SHA__"

    joins:
      - name: VendaCliente
        relationship: belongsTo
        sql: "{CUBE}.IdCliente = {VendaCliente}.Id"

      - name: CompraFornecedor
        relationship: belongsTo
        sql: "{CUBE}.IdRepresentante = {CompraFornecedor}.Id"

      - name: CompraTransportadora
        relationship: belongsTo
        sql: "{CUBE}.IdTransportadora = {CompraTransportadora}.Id"

      - name: PreCadastrosEmpresa
        relationship: belongsTo
        sql: "{CUBE}.IdEmpresa = {PreCadastrosEmpresa}.Id"

      - name: DataEmissao
        relationship: belongsTo
        sql: "{CUBE}.IdDataEmissao = {DataEmissao}.Id"

      - name: DataEntrega
        relationship: belongsTo
        sql: "{CUBE}.IdDataEntrega = {DataEntrega}.Id"

      - name: FaturamentoTipoFrete
        relationship: belongsTo
        sql: "{CUBE}.IdTipoFrete = {FaturamentoTipoFrete}.Id"

      - name: PreCadastrosMunicipio
        relationship: belongsTo
        sql: "{CUBE}.IdMunicipio = {PreCadastrosMunicipio}.Id"

      - name: PreCadastrosPais
        relationship: belongsTo
        sql: "{CUBE}.IdPais = {PreCadastrosPais}.Id"

      - name: PreCadastrosEstado
        relationship: belongsTo
        sql: "{CUBE}.IdEstado = {PreCadastrosEstado}.Id"

      - name: VendaStatusPedido
        relationship: belongsTo
        sql: "{CUBE}.IdVendaStatusPedido = {VendaStatusPedido}.Id"

      - name: VendaPedido
        relationship: belongsTo
        sql: "{CUBE}.IdVendaPedido = {VendaPedido}.Id"

      - name: VendaEquipe
        relationship: belongsTo
        sql: "{CUBE}.IdVendaEquipe = {VendaEquipe}.Id"

      - name: VendaClienteClasse
        relationship: belongsTo
        sql: "{CUBE}.IdClienteClasse = {VendaClienteClasse}.Id"

      - name: VendaSegmento
        relationship: belongsTo
        sql: "{CUBE}.IdClienteSegmento = {VendaSegmento}.Id"

      - name: StatusRegistro
        relationship: belongsTo
        sql: "{CUBE}.IdStatusRegistro = {StatusRegistro}.Id"

    measures:
      - name: count
        type: count

      - name: valorFreteSum
        sql: ValorFrete
        type: sum
        title: Soma do Frete

      - name: valorDescontoSum
        sql: ValorDesconto
        type: sum
        title: Soma do Desconto

      - name: valorIpiSum
