      - name: CompraFornecedorClasse
        relationship: belongsTo
        sql: "{CUBE}.IdFornecedorClasse = {CompraFornecedorClasse}.Id"

      - name: FornecedorSegmento
        relationship: belongsTo
        sql: "{CUBE}.IdFornecedorSegmento = {FornecedorSegmento}.Id"

      - name: FiscalCFOP
        relationship: belongsTo
        sql: "{CUBE}.IdCfop = {FiscalCFOP}.Id"

      - name: CompraNotaFiscal
        relationship: belongsTo
        sql: "{CUBE}.IdNotaFiscal = {CompraNotaFiscal}.Id"

      - name: CompraPedido
        relationship: belongsTo
        sql: "{CUBE}.IdCompraPedido = {CompraPedido}.Id"

      - name: VendaCliente
        relationship: belongsTo
        sql: "{CUBE}.IdCliente = {VendaCliente}.Id"

      - name: VendaClienteClasse
        relationship: belongsTo
        sql: "{CUBE}.IdClienteClasse = {VendaClienteClasse}.Id"

