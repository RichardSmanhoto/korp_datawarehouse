        type: sum
        title: Soma do COFINS

      - name: valorIssSum
        sql: ValorIss
        type: sum
        title: Soma do ISS

      - name: valorIcmsStSum
        sql: ValorIcmsSt
        type: sum
        title: Soma do ICMS-ST

      - name: valorTotalRetencaoSum
