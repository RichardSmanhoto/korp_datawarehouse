      - name: CompraItemNotaFiscalNumero
        relationship: belongsTo
        sql: "{CUBE}.IdItemNotaFiscalCompra = {CompraItemNotaFiscalNumero}.Id"

    measures:
      - name: count
        type: count

      - name: quantidadeSum
        sql: Quantidade
        type: sum
        title: Soma da Quantidade

      - name: valorUnitarioSum
        sql: ValorUnitario
        type: sum
        title: Soma do Valor Unitário

      - name: valorTotalDescontoSum
        sql: ValorTotalDesconto
        type: sum
