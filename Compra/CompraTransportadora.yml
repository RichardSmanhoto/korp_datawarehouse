cubes:

  - name: CompraTransportadora
    sql_table: "`viasoft_elt`.`{COMPILE_CONTEXT.securityContext.schema}.CompraTransportadora`"
    title: Compra Transportadora
    meta:
      - versao: "__COMMIT_SHA__"

    measures:
      - name: count
        type: count

    dimensions:
      - name: id
        sql: Id
        type: number
        primary_key: true
        title: Id

      - name: codigo
        sql: Codigo
        type: string
        title: Código

      - name: razaoSocial
        sql: RazaoSocial
        type: string
        title: Razão Social
