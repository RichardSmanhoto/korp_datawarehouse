cubes:

  - name: CompraNotaFiscal
    sql_table: "`viasoft_elt`.`{COMPILE_CONTEXT.securityContext.schema}.CompraNotaFiscal`"
    title: Compra Nota Fiscal
    meta:
      - versao: "__COMMIT_SHA__"

    measures:
      - name: count
        type: count

    dimensions:
      - name: id
        sql: Id
        type: number
        primary_key: true
        title: Id

      - name: numero
        sql: Numero
        type: number
        title: Número

      - name: serie
        sql: Serie
        type: string
        title: Série

      - name: chaveAcesso
        sql: ChaveAcesso
        type: string
        title: Chave de Acesso

      - name: efetuadoEntrada
        sql: EfetuadoEntrada
        type: boolean
        title: Efetuado Entrada
