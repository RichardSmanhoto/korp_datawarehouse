cubes:
  - name: FatoCompraPedidoParcela
    sql_table: "`viasoft_elt`.`{COMPILE_CONTEXT.securityContext.schema}.FatoCompraPedidoParcela`"
    title: Compra Parcela do Pedido
    
    meta:
      - versao: "__COMMIT_SHA__"

    joins:
      - name: Data
        relationship: belongsTo
        sql: "{CUBE}.IdData = {Data}.Id"

      - name: PreCadastrosEmpresa
        relationship: belongsTo
        sql: "{CUBE}.IdEmpresa = {PreCadastrosEmpresa}.Id"

      - name: FinanceiroCentroCusto
        relationship: belongsTo
        sql: "{CUBE}.IdCentroCusto = {FinanceiroCentroCusto}.Id"

      - name: FinanceiroContaGerencial
        relationship: belongsTo
        sql: "{CUBE}.IdContaGerencial = {FinanceiroContaGerencial}.Id"

      - name: CompraFornecedor
        relationship: belongsTo
        sql: "{CUBE}.IdFornecedor = {CompraFornecedor}.Id"

      - name: CompraPedido
        relationship: belongsTo
        sql: "{CUBE}.IdCompraPedido = {CompraPedido}.Id"

      - name: StatusRegistro
        relationship: belongsTo
        sql: "{CUBE}.IdStatusRegistro = {StatusRegistro}.Id"

    measures:
      - name: count
        type: count

      - name: valorSum
        sql: Valor
        type: sum
        title: Soma do Valor

    dimensions:
      - name: id
        sql: Id
        type: string
        primary_key: true
        title: Id

      - name: idData
        sql: IdData
        type: number
        title: Data

      - name: idEmpresa
        sql: IdEmpresa
        type: number
        title: Empresa

      - name: idCentroCusto
        sql: IdCentroCusto
        type: number
        title: Centro de Custo

      - name: idContaGerencial
        sql: IdContaGerencial
        type: number
        title: Conta Gerencial

      - name: idFornecedor
        sql: IdFornecedor
        type: number
        title: Fornecedor

      - name: idStatusRegistro
        sql: IdStatusRegistro
        type: string
        title: Registro Ativo

      - name: idCompraPedido
        sql: IdCompraPedido
        type: number
        title: Pedido

      - name: valor
        sql: Valor
        type: number
        title: Valor
