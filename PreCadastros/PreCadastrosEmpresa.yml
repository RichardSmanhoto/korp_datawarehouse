cubes:
  - name: PreCadastrosEmpresa
    sql_table: "`viasoft_elt`.`{COMPILE_CONTEXT.securityContext.schema}.PreCadastrosEmpresa`"
    title: Geral Empresa

    meta:
      - versao: "__COMMIT_SHA__"

    measures:
      - name: count
        type: count

    dimensions:
      - name: id
        sql: Id
        type: number
        primary_key: true
        title: Id

      - name: razaoSocial
        sql: RazaoSocial
        type: string
        title: Razão Social

      - name: fantasia
        sql: Fantasia
        type: string
        title: Nome Fantasia
