cubes:
  - name: LogisticaProdutoGrupo
    sql_table: "`viasoft_elt`.`{COMPILE_CONTEXT.securityContext.schema}.LogisticaProdutoGrupo`"
    title: Logística Grupo Produto
    meta:
      - versao: "__COMMIT_SHA__"

    measures:
      - name: count
        type: count

    dimensions:
      - name: id
        sql: Id
        type: number
        primary_key: true
        title: Id

      - name: codigo
        sql: Codigo
        type: string
        title: Código

      - name: descricao
        sql: Descricao
        type: string
        title: Descrição
