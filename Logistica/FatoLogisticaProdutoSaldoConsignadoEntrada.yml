cubes:
  - name: FatoLogisticaProdutoSaldoConsignadoEntrada
    sql_table: "`viasoft_elt`.`{COMPILE_CONTEXT.securityContext.schema}.FatoLogisticaProdutoSaldoConsignadoEntrada`"
    title: Logística Produto - Saldo Consignado - Entrada
    
    meta:
      - versao: "__COMMIT_SHA__"

    joins:
      - name: LogisticaProduto
        relationship: belongsTo
        sql: "{CUBE}.IdProduto = {LogisticaProduto}.Id"

      - name: PreCadastrosEmpresa
        relationship: belongsTo
        sql: "{CUBE}.IdEmpresa = {PreCadastrosEmpresa}.Id"

      - name: CompraItemNotaFiscalNumero
        relationship: belongsTo
        sql: "{CUBE}.IdCompraItemNotaEntrada = {CompraItemNotaFiscalNumero}.Id"

      - name: VendaCliente
        relationship: belongsTo
        sql: "{CUBE}.IdCliente = {VendaCliente}.Id"

      - name: CompraFornecedor
        relationship: belongsTo
        sql: "{CUBE}.IdFornecedor = {CompraFornecedor}.Id"

      - name: StatusRegistro
        relationship: belongsTo
        sql: "{CUBE}.IdStatusRegistro = {StatusRegistro}.Id"

    measures:
      - name: count
        type: count

      - name: quantidadeSum
        sql: Quantidade
        type: sum
        title: Soma da Quantidade

      - name: valorUnitarioSum
        sql: ValorUnitario
        type: sum
        title: Soma do Valor Unitário

    dimensions:
      - name: id
        sql: Id
        type: string
        primary_key: true
        title: Id

      - name: idProduto
        sql: IdProduto
        type: number
        title: Produto

      - name: idEmpresa
        sql: IdEmpresa
        type: number
        title: Empresa

      - name: idCompraItemNotaEntrada
        sql: IdCompraItemNotaEntrada
        type: number
        title: Nota Fiscal

      - name: idCliente
        sql: IdCliente
        type: number
        title: Cliente

      - name: idFornecedor
        sql: IdFornecedor
        type: number
        title: Fornecedor

      - name: idStatusRegistro
        sql: IdStatusRegistro
        type: string
        title: Registro Ativo

      - name: quantidade
        sql: Quantidade
        type: number
        title: Quantidade

      - name: valorUnitario
        sql: ValorUnitario
        type: number
        title: Valor Unitário
