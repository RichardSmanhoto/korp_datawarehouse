cubes:
  - name: LogisticaProdutoLote
    sql_table: "`viasoft_elt`.`{COMPILE_CONTEXT.securityContext.schema}.LogisticaProdutoLote`"
    title: Logística Lote Produto
    meta:
      - versao: "__COMMIT_SHA__"

    measures:
      - name: count
        type: count

    dimensions:
      - name: id
        sql: Id
        type: number
        primary_key: true
        title: Id

      - name: lote
        sql: Lote
        type: string
        title: Lote

      - name: inativo
        sql: Inativo
        type: boolean
        title: Inativo

      - name: dataValidade
        sql: DataValidade
        type: time
        title: Data Validade
